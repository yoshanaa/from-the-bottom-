<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log - From the Bottom</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <nav class="nav">
    <a href="../index.html" class="nav-logo">ftb.</a>
    <div class="nav-links">
      <a href="../index.html">home</a>
      <a href="log.html" class="active">log</a>
      <a href="wins.html">wins</a>
      <a href="about.html">about</a>
    </div>
  </nav>

  <div class="page-hero">
    <h1 class="page-title">the <span style="color:var(--accent-light)">log.</span></h1>
    <p class="page-desc">every entry, unfiltered. the dips, the highs, all of it.</p>
  </div>

  <div class="page-content">
    <div class="log-full-list" id="log-full-list">
      <p class="empty-state">loading...</p>
    </div>
  </div>

  <footer class="footer">
    <span>from the bottom - <span id="footer-year"></span></span>
  </footer>

  <script src="../js/config.js"></script>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    document.getElementById('footer-year').textContent = new Date().getFullYear()

    function moodColor(score) {
      if (score <= 3) return '#f87171'
      if (score <= 5) return '#fbbf24'
      if (score <= 7) return '#a68afd'
      return '#3ecf8e'
    }

    function fmtDate(iso) {
      return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
    }

    async function load() {
      const { data: { user } } = await supabase.auth.getUser()
      if (!user) { window.location.href = '../index.html'; return }

      const { data: moods } = await supabase
        .from('mood table')
        .select('*')
        .eq('user_id', user.id)
        .order('created_at', { ascending: false })

      const el = document.getElementById('log-full-list')
      if (!moods || !moods.length) {
        el.innerHTML = '<p class="empty-state">nothing here yet. go check in from the home page.</p>'
        return
      }
      el.innerHTML = moods.map(m => `
        <div class="entry-item">
          <span class="entry-date">${fmtDate(m.created_at)}</span>
          <span class="entry-text">${m.note || '<em>no note written</em>'}</span>
          <span class="entry-score" style="color:${moodColor(m.score)}">${m.score}</span>
        </div>
      `).join('')
    }

    load()
  </script>
</body>
</html>
